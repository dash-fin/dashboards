name: Backfill Historico OI Opciones

on:
  workflow_dispatch:
    inputs:
      fecha_inicio:
        description: 'Fecha inicio (YYYY-MM-DD)'
        required: true
        default: '2026-03-23'
      fecha_fin:
        description: 'Fecha fin (YYYY-MM-DD)'
        required: true
        default: '2026-04-25'

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install anthropic supabase requests urllib3

      - name: Correr backfill
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          SB_URL: ${{ secrets.SB_URL }}
          SB_KEY: ${{ secrets.SB_KEY }}
        run: python scripts/process_iamc.py --backfill ${{ github.event.inputs.fecha_inicio }}:${{ github.event.inputs.fecha_fin }}
