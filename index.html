<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboards Financieros</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
/* ── RESET & VARIABLES ── */
*{box-sizing:border-box;margin:0;padding:0}

:root,[data-theme="default"]{
  --bg:#0e1a2b;--bg2:#132236;--bg3:#1a2e48;--bg4:#213858;
  --border:#1e3a5a;--border2:#2a4870;--border3:#355888;
  --text:#e8f0fa;--text2:#b8d0ec;--text3:#7a9ec0;--text4:#4a6e90;
  --green:#00d084;--greenDim:rgba(0,208,132,.10);
  --red:#ff4455;--redDim:rgba(255,68,85,.10);
  --amber:#f0b020;--amberDim:rgba(240,176,32,.10);
  --blue:#48aaff;--blueDim:rgba(72,170,255,.10);
  --purple:#b090ff;--purpleDim:rgba(176,144,255,.10);
  --cyan:#00d8e8;--cyanDim:rgba(0,216,232,.10);
}

[data-theme="oscuro"]{
  --bg:#07090c;--bg2:#0d1117;--bg3:#131820;--bg4:#1a2030;
  --border:#1e2530;--border2:#28303f;--border3:#323d50;
  --text:#eef2f8;--text2:#b8c8dc;--text3:#6e88a8;--text4:#3a4a62;
  --green:#00e5a8;--greenDim:rgba(0,229,168,.10);
  --red:#ff3f5e;--redDim:rgba(255,63,94,.10);
  --amber:#f0a500;--amberDim:rgba(240,165,0,.10);
  --blue:#4da6ff;--blueDim:rgba(77,166,255,.10);
  --purple:#b39dff;--purpleDim:rgba(179,157,255,.10);
  --cyan:#00d4e8;--cyanDim:rgba(0,212,232,.10);
}

[data-theme="claro"]{
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#e8edf5;--bg4:#dde3ee;
  --border:#c8d0e0;--border2:#b8c2d8;--border3:#a0aec0;
  --text:#0a1520;--text2:#2a3a50;--text3:#5a7090;--text4:#90a8c0;
  --green:#006e48;--greenDim:rgba(0,110,72,.08);
  --red:#b80020;--redDim:rgba(184,0,32,.07);
  --amber:#8a5200;--amberDim:rgba(138,82,0,.08);
  --blue:#1048a8;--blueDim:rgba(16,72,168,.08);
  --purple:#4a28a8;--purpleDim:rgba(74,40,168,.08);
  --cyan:#005870;--cyanDim:rgba(0,88,112,.08);
}

/* ── LAYOUT PRINCIPAL ── */
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.5;overflow-x:hidden}
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
.header{position:sticky;top:0;z-index:200;background:var(--bg2);border-bottom:1px solid var(--border)}
.header-top{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.logo{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.logo span{color:var(--green)}
.header-top-right{display:flex;align-items:center;gap:12px}

/* Estilos de Botones y Tabs */
.mtab{padding:0 16px;font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;height:44px}
.mtab.active{color:var(--green);border-bottom-color:var(--green)}
.mtab.disabled{opacity:.35;cursor:default;pointer-events:none}

.module-wrap{padding:20px 24px;max-width:1600px;width:100%;margin:0 auto}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* (Truncado por espacio: el resto de tus estilos CSS se mantienen iguales) */
/* ... tus estilos de .card, .kpi, .rank, .overlay, .modal, etc ... */
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">Dashboards <span>Financieros</span></div>
      <div class="header-top-right">
        <div class="last-update">Act: <span id="lastUpdate">—</span></div>
        
        <div id="userPill" style="display:none;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:3px 12px 3px 8px;cursor:pointer" onclick="showUserMenu()">
          <div style="width:22px;height:22px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#000" id="userAvatar">—</div>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2)" id="userEmail">—</span>
        </div>
        <button id="loginBtn" onclick="openAuth()" style="background:transparent;border:1px solid var(--border2);border-radius:4px;padding:4px 12px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);cursor:pointer;text-transform:uppercase">Ingresar</button>
        
        <div class="clock" id="clock">00:00:00</div>
      </div>
    </div>

    <div class="module-tabs">
      <button class="mtab active" id="mtab-home" onclick="loadModule('home',this)">🏠 Inicio</button>
      <button class="mtab" id="mtab-portafolio" onclick="loadModuleAuth('portafolio',this)">💼 Portafolio</button>
      <button class="mtab" id="mtab-opciones" onclick="loadModuleAuth('opciones',this)">Opciones</button>
      <button class="mtab" id="mtab-cedears" onclick="loadModuleAuth('cedears',this)">CEDEARs</button>
      <button class="mtab" id="mtab-bonos" onclick="loadModuleAuth('bonos',this)">Renta Fija</button>
    </div>
  </div>

  <div class="content">
    <div id="moduleContainer" class="module-wrap"></div>
  </div>
</div>

<div class="overlay" id="authOverlay">
  </div>

<script>
// ── CONFIGURACIÓN GLOBAL ──
window.CFG = {
  SB_URL: 'https://endymbpdayeidromxayb.supabase.co',
  SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuZHltYnBkYXllaWRyb214YXliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MzU4NTAsImV4cCI6MjA4OTExMTg1MH0.BCZRvE9F1g_w2ffwj6NA6vyCYab2XcHDgmZir3CkeOk',
  ADMIN_PASSWORD: localStorage.getItem('ap') || 'Ggal2026+',
};
window.CFG.SBH = { 'apikey': CFG.SB_KEY, 'Authorization': 'Bearer ' + CFG.SB_KEY };

// ── SUPABASE AUTH ──
const { createClient } = supabase;
window.sbAuth = createClient(CFG.SB_URL, CFG.SB_KEY);
window.currentUser = null;

sbAuth.auth.onAuthStateChange((event, session) => {
  window.currentUser = session?.user || null;
  updateUserUI();
  if (event === 'SIGNED_IN' && window._pendingModule) {
    const { name, btn } = window._pendingModule;
    window._pendingModule = null;
    loadModule(name, btn);
  }
});

// ── FUNCIONES DE BASE DE DATOS (CRUD GLOBAL) ──
window.sb = async (table, params='') => {
  try {
    const session = await sbAuth.auth.getSession();
    const token = session?.data?.session?.access_token;
    const headers = token ? { 'apikey': CFG.SB_KEY, 'Authorization': 'Bearer ' + token } : CFG.SBH;
    const r = await fetch(`${CFG.SB_URL}/rest/v1/${table}?${params}`, {headers});
    return r.ok ? await r.json() : null;
  } catch { return null; }
};

window.sbInsert = async (table, body) => {
  try {
    const session = await sbAuth.auth.getSession();
    const token = session?.data?.session?.access_token;
    const r = await fetch(`${CFG.SB_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { 'apikey': CFG.SB_KEY, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify(body)
    });
    return r.ok;
  } catch { return false; }
};

window.sbPatch = async (table, params, body) => {
  try {
    const session = await sbAuth.auth.getSession();
    const token = session?.data?.session?.access_token;
    const r = await fetch(`${CFG.SB_URL}/rest/v1/${table}?${params}`, {
      method: 'PATCH',
      headers: { 'apikey': CFG.SB_KEY, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    return r.ok;
  } catch { return false; }
};

// ── LOADER DE MÓDULOS ──
window.loadModule = async (name, btn) => {
  Object.values(window.moduleTimers || {}).forEach(t => clearInterval(t));
  window.moduleTimers = {};
  
  document.querySelectorAll('.mtab').forEach(t => t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  
  const container = document.getElementById('moduleContainer');
  container.innerHTML = `<div class="module-loading"><div class="spinner"></div>Cargando...</div>`;
  
  try {
    const r = await fetch(`modules/${name}.html?v=${Date.now()}`);
    if(!r.ok) throw new Error('No se pudo cargar el módulo');
    const html = await r.text();
    container.innerHTML = html;
    
    // Ejecutar scripts del módulo
    container.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      s.textContent = old.textContent;
      document.body.appendChild(s); 
    });
  } catch(e) {
    container.innerHTML = `<div style="color:var(--red);padding:40px;text-align:center">Error: ${e.message}</div>`;
  }
};

window.loadModuleAuth = (name, btn) => {
  if (!currentUser) { window._pendingModule = { name, btn }; openAuth(); return; }
  loadModule(name, btn);
};

// ── UTILS ──
window.fmtAR = (n,dec=2) => {
  if(n==null||isNaN(n))return'—';
  const[i,d]=Math.abs(Number(n)).toFixed(dec).split('.');
  return(n<0?'-':'')+i.replace(/\B(?=(\d{3})+(?!\d))/g,'.')+(d!==undefined?','+d:'');
};

function updateUserUI() {
  const pill = document.getElementById('userPill');
  const btn = document.getElementById('loginBtn');
  if (currentUser) {
    document.getElementById('userEmail').textContent = currentUser.email.split('@')[0];
    pill.style.display = 'flex'; btn.style.display = 'none';
  } else {
    pill.style.display = 'none'; btn.style.display = 'block';
  }
}

function updateClock() {
  const now = new Date();
  const p = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent = `${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
}

// ── INIT ──
setInterval(updateClock, 1000);
updateClock();
loadModule('home', document.getElementById('mtab-home'));
</script>
</body>
</html>
