<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboards Financieros</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* (Mantenemos todos tus estilos CSS originales aquí para no romper el diseño) */
*{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="default"]{
  --bg:#0e1a2b;--bg2:#132236;--bg3:#1a2e48;--bg4:#213858;
  --border:#1e3a5a;--border2:#2a4870;--border3:#355888;
  --text:#e8f0fa;--text2:#b8d0ec;--text3:#7a9ec0;--text4:#4a6e90;
  --green:#00d084;--greenDim:rgba(0,208,132,.10);
  --red:#ff4455;--redDim:rgba(255,68,85,.10);
  --amber:#f0b020;--amberDim:rgba(240,176,32,.10);
  --blue:#48aaff;--blueDim:rgba(72,170,255,.10);
  --purple:#b090ff;--purpleDim:rgba(176,144,255,.10);
  --cyan:#00d8e8;--cyanDim:rgba(0,216,232,.10);
}
/* Reutilizar el resto de tus estilos de [data-theme="oscuro"], etc. */
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.5;overflow-x:hidden}
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
.header{position:sticky;top:0;z-index:200;background:var(--bg2);border-bottom:1px solid var(--border)}
.header-top{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.logo{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.logo span{color:var(--green)}
.header-top-right{display:flex;align-items:center;gap:12px}
.clock{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:1px}
.module-tabs{height:44px;display:flex;align-items:stretch;padding:0 16px;border-bottom:1px solid var(--border);overflow-x:auto;gap:2px}
.mtab{display:flex;align-items:center;gap:7px;padding:0 16px;font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.mtab.active{color:var(--green);border-bottom-color:var(--green)}
.module-wrap{padding:20px 24px;max-width:1600px;width:100%;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.block-title{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;padding:9px 14px;border-bottom:1px solid var(--border)}
.dolar-table{width:100%;border-collapse:collapse}
.dolar-table td{padding:7px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;border-bottom:1px solid rgba(30,37,48,.5);text-align:right;color:var(--text2)}
.dolar-table td:first-child{text-align:left;color:var(--text);font-weight:500}
.sec-head{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.rank-card{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;overflow:hidden;margin-bottom:10px}
.rank-item{display:grid;grid-template-columns:16px 1fr auto auto;align-items:center;gap:6px;padding:7px 12px;border-bottom:1px solid rgba(30,37,48,.5)}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Agrega aquí cualquier otro estilo que falte de tu original */
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">Dashboards <span>Financieros</span></div>
      <div class="header-top-right">
        <div class="last-update">Act: <span id="lastUpdate">—</span></div>
        <div id="userPill" style="display:none;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:3px 12px 3px 8px;cursor:pointer" onclick="showUserMenu()">
          <div style="width:22px;height:22px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#000" id="userAvatar">—</div>
          <span id="userEmail" style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2)">—</span>
        </div>
        <button id="loginBtn" onclick="openAuth()" style="background:transparent;border:1px solid var(--border2);border-radius:4px;padding:4px 12px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);cursor:pointer">INGRESAR</button>
        <div class="clock" id="clock">00:00:00</div>
      </div>
    </div>
    <div class="module-tabs">
      <button class="mtab active" id="mtab-home" onclick="loadModule('home',this)">🏠 Inicio</button>
      <button class="mtab" id="mtab-portafolio" onclick="loadModuleAuth('portafolio',this)">💼 Portafolio</button>
      <button class="mtab" id="mtab-opciones" onclick="loadModuleAuth('opciones',this)">Opciones</button>
      <button class="mtab" id="mtab-cedears" onclick="loadModuleAuth('cedears',this)">CEDEARs</button>
      <button class="mtab" id="mtab-bonos" onclick="loadModuleAuth('bonos',this)">Renta Fija</button>
    </div>
  </div>

  <div class="content">
    <div id="moduleContainer" class="module-wrap"></div>
  </div>
</div>

<script>
// ── CONFIGURACIÓN Y AUTH ──
window.CFG = {
  SB_URL: 'https://endymbpdayeidromxayb.supabase.co',
  SB_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVuZHltYnBkYXllaWRyb214YXliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MzU4NTAsImV4cCI6MjA4OTExMTg1MH0.BCZRvE9F1g_w2ffwj6NA6vyCYab2XcHDgmZir3CkeOk',
  SBH: { 'apikey': '', 'Authorization': '' }
};
window.CFG.SBH = { 'apikey': CFG.SB_KEY, 'Authorization': 'Bearer ' + CFG.SB_KEY };

const { createClient } = supabase;
window.sbAuth = createClient(CFG.SB_URL, CFG.SB_KEY);
window.currentUser = null;

// ── CRUD HELPERS (RESTURADOS Y COMPLETOS) ──
window.sb = async (table, params='') => {
  const s = await sbAuth.auth.getSession();
  const t = s.data.session?.access_token;
  const h = t ? { 'apikey': CFG.SB_KEY, 'Authorization': 'Bearer ' + t } : CFG.SBH;
  const r = await fetch(`${CFG.SB_URL}/rest/v1/${table}?${params}`, { headers: h });
  return r.ok ? await r.json() : null;
};

window.sbInsert = async (table, body) => {
  const s = await sbAuth.auth.getSession();
  const t = s.data.session?.access_token;
  const r = await fetch(`${CFG.SB_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: { 'apikey': CFG.SB_KEY, 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(body)
  });
  return r.ok;
};

window.sbPatch = async (table, params, body) => {
  const s = await sbAuth.auth.getSession();
  const t = s.data.session?.access_token;
  const r = await fetch(`${CFG.SB_URL}/rest/v1/${table}?${params}`, {
    method: 'PATCH',
    headers: { 'apikey': CFG.SB_KEY, 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return r.ok;
};

// ── LÓGICA DE MÓDULOS ──
window.moduleTimers = {};
window.loadModule = async (name, btn) => {
  Object.values(window.moduleTimers).forEach(t => clearInterval(t));
  window.moduleTimers = {};
  
  document.querySelectorAll('.mtab').forEach(t => t.classList.remove('active'));
  if(btn) btn.classList.add('active');
  
  const container = document.getElementById('moduleContainer');
  
  if (name === 'home') {
    renderHome();
    return;
  }

  container.innerHTML = `<div style="display:flex;gap:10px;align-items:center"><div class="spinner"></div> Cargando ${name}...</div>`;
  try {
    const r = await fetch(`modules/${name}.html`);
    if(!r.ok) throw new Error();
    const html = await r.text();
    container.innerHTML = html;
    container.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      s.textContent = old.textContent;
      document.body.appendChild(s);
    });
  } catch {
    container.innerHTML = 'Error al cargar módulo.';
  }
};

window.loadModuleAuth = (name, btn) => {
  if (!currentUser) { window._pendingModule = {name, btn}; alert("Iniciá sesión"); return; }
  loadModule(name, btn);
};

// ── RENDER HOME (LA PIEZA QUE FALTABA) ──
async function renderHome() {
  const container = document.getElementById('moduleContainer');
  container.innerHTML = `
    <div style="display:grid;grid-template-columns: 300px 1fr; gap:20px">
      <div id="sideHome">
        <div class="card"><div class="block-title">Tipo de Cambio</div><table class="dolar-table" id="dolarBody"></table></div>
      </div>
      <div id="mainHome">
        <div class="sec-head">Mercado Argentino</div>
        <div style="display:grid;grid-template-columns:1fr 1fr; gap:15px">
           <div class="rank-card"><div class="block-title">Acciones - Más operadas</div><div id="acc-turnover"></div></div>
           <div class="rank-card"><div class="block-title">CEDEARs - Más operadas</div><div id="ced-turnover"></div></div>
        </div>
      </div>
    </div>
  `;
  loadDolar();
  loadRankings();
  window.moduleTimers.home = setInterval(() => { loadDolar(); loadRankings(); }, 30000);
}

// ── AUXILIARES DE DATA ──
async function loadDolar() {
  const r = await fetch('https://dolarapi.com/v1/dolares');
  const data = await r.json();
  const el = document.getElementById('dolarBody');
  if(el) el.innerHTML = data.map(d => `<tr><td>${d.nombre}</td><td>$${d.venta}</td></tr>`).join('');
}

async function loadRankings() {
  const acc = await sb('mercado', 'instrument_group=eq.bluechips&order=turnover.desc&limit=5');
  const ced = await sb('mercado', 'instrument_group=eq.cedears&order=turnover.desc&limit=5');
  
  const render = (id, rows) => {
    const el = document.getElementById(id);
    if(el) el.innerHTML = rows.map(r => `<div class="rank-item"><span></span><span>${r.symbol}</span><span>$${r.last}</span><span style="color:${r.change>=0?'var(--green)':'var(--red)'}">${r.change}%</span></div>`).join('');
  };
  render('acc-turnover', acc || []);
  render('ced-turnover', ced || []);
}

// ── AUTH UI ──
sbAuth.auth.onAuthStateChange((event, session) => {
  window.currentUser = session?.user || null;
  const pill = document.getElementById('userPill');
  const btn = document.getElementById('loginBtn');
  if(currentUser) {
    pill.style.display = 'flex'; btn.style.display = 'none';
    document.getElementById('userAvatar').textContent = currentUser.email[0].toUpperCase();
    document.getElementById('userEmail').textContent = currentUser.email.split('@')[0];
  } else {
    pill.style.display = 'none'; btn.style.display = 'block';
  }
});

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString();
}

// ── START ──
setInterval(updateClock, 1000);
renderHome();
</script>
</body>
</html>
