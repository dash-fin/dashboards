<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboards Financieros</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── TEMA: DEFAULT ── */
:root,[data-theme="default"]{
  --bg:#0e1a2b;--bg2:#132236;--bg3:#1a2e48;--bg4:#213858;
  --border:#1e3a5a;--border2:#2a4870;--border3:#355888;
  --text:#e8f0fa;--text2:#b8d0ec;--text3:#7a9ec0;--text4:#4a6e90;
  --green:#00d084;--greenDim:rgba(0,208,132,.10);
  --red:#ff4455;--redDim:rgba(255,68,85,.10);
  --amber:#f0b020;--amberDim:rgba(240,176,32,.10);
  --blue:#48aaff;--blueDim:rgba(72,170,255,.10);
  --purple:#b090ff;--purpleDim:rgba(176,144,255,.10);
  --cyan:#00d8e8;--cyanDim:rgba(0,216,232,.10);
}

/* ── TEMA: OSCURO (negro puro, el original) ── */
[data-theme="oscuro"]{
  --bg:#07090c;--bg2:#0d1117;--bg3:#131820;--bg4:#1a2030;
  --border:#1e2530;--border2:#28303f;--border3:#323d50;
  --text:#eef2f8;--text2:#b8c8dc;--text3:#6e88a8;--text4:#3a4a62;
  --green:#00e5a8;--greenDim:rgba(0,229,168,.10);
  --red:#ff3f5e;--redDim:rgba(255,63,94,.10);
  --amber:#f0a500;--amberDim:rgba(240,165,0,.10);
  --blue:#4da6ff;--blueDim:rgba(77,166,255,.10);
  --purple:#b39dff;--purpleDim:rgba(179,157,255,.10);
  --cyan:#00d4e8;--cyanDim:rgba(0,212,232,.10);
}

/* ── TEMA: CLARO ── */
[data-theme="claro"]{
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#e8edf5;--bg4:#dde3ee;
  --border:#c8d0e0;--border2:#b8c2d8;--border3:#a0aec0;
  --text:#0a1520;--text2:#2a3a50;--text3:#5a7090;--text4:#90a8c0;
  --green:#006e48;--greenDim:rgba(0,110,72,.08);
  --red:#b80020;--redDim:rgba(184,0,32,.07);
  --amber:#8a5200;--amberDim:rgba(138,82,0,.08);
  --blue:#1048a8;--blueDim:rgba(16,72,168,.08);
  --purple:#4a28a8;--purpleDim:rgba(74,40,168,.08);
  --cyan:#005870;--cyanDim:rgba(0,88,112,.08);
}

/* ── TEMA: SEPIA (cálido, sesiones largas) ── */
[data-theme="sepia"]{
  --bg:#18130e;--bg2:#211810;--bg3:#2a2015;--bg4:#33281c;
  --border:#3d2e1e;--border2:#4a3828;--border3:#5a4835;
  --text:#f2e8d5;--text2:#d5b888;--text3:#906848;--text4:#584030;
  --green:#4ec870;--greenDim:rgba(78,200,112,.10);
  --red:#e05848;--redDim:rgba(224,88,72,.10);
  --amber:#e8a820;--amberDim:rgba(232,168,32,.10);
  --blue:#78b0e8;--blueDim:rgba(120,176,232,.10);
  --purple:#c898e8;--purpleDim:rgba(200,152,232,.10);
  --cyan:#48c8b8;--cyanDim:rgba(72,200,184,.10);
}

/* ── Dropdown de tema ── */
.theme-dropdown{position:relative}
.theme-drop-btn{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:3px 9px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;transition:all .15s;white-space:nowrap}
.theme-drop-btn:hover{border-color:var(--border3);color:var(--text)}
.theme-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.theme-drop-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;overflow:hidden;z-index:500;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.theme-drop-menu.open{display:block}
.theme-drop-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);letter-spacing:.5px;transition:background .1s;white-space:nowrap}
.theme-drop-item:hover{background:var(--bg3);color:var(--text)}
.theme-drop-item.active{color:var(--green)}
.sw-vetacap{background:#1a2e48;border:1px solid #48aaff}
.sw-oscuro{background:#131820;border:1px solid #323d50}
.sw-claro{background:#ffffff;border:1px solid #b8c2d8}
.sw-sepia{background:#2a2015;border:1px solid #5a4835}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.5;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.app{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
.header{position:sticky;top:0;z-index:200;background:var(--bg2)}
.header-top{height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border)}
.logo{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.logo span{color:var(--green)}
.header-top-right{display:flex;align-items:center;gap:12px}
.clock{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);letter-spacing:1px}
.mkt-badge{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;padding:3px 9px;border-radius:3px;border:1px solid;text-transform:uppercase}
.mkt-open{color:var(--green);border-color:rgba(0,229,168,.3);background:var(--greenDim)}
.mkt-closed{color:var(--text3);border-color:var(--border);background:var(--bg3)}
.mkt-dot{width:5px;height:5px;border-radius:50%}
.mkt-open .mkt-dot{background:var(--green);animation:pulse 2s infinite}
.mkt-closed .mkt-dot{background:var(--text4)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.last-update{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3)}
.indices-strip{height:36px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--bg2)}
.indices-strip::-webkit-scrollbar{height:0}
.strip-item{display:flex;align-items:center;gap:7px;padding:0 14px;border-right:1px solid var(--border);height:36px;white-space:nowrap;flex-shrink:0}
.strip-item:first-child{padding-left:0}
.strip-sym{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;color:var(--text)}
.strip-val{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text)}
.strip-chg{font-family:'IBM Plex Mono',monospace;font-size:9px}
.strip-chg.up{color:var(--green)}.strip-chg.dn{color:var(--red)}.strip-chg.flat{color:var(--text3)}
.module-tabs{height:44px;display:flex;align-items:stretch;padding:0 16px;border-bottom:1px solid var(--border);overflow-x:auto;gap:2px}
.module-tabs::-webkit-scrollbar{height:0}
.mtab{display:flex;align-items:center;gap:7px;padding:0 16px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;font-weight:500;flex-shrink:0}
.mtab:hover{color:var(--text2)}
.mtab.active{color:var(--green);border-bottom-color:var(--green)}
.mtab.disabled{opacity:.35;cursor:default;pointer-events:none}
.mtab-dot{width:5px;height:5px;border-radius:50%;background:var(--green);opacity:.7}
.mtab-badge{font-size:7px;padding:1px 5px;border-radius:2px;background:var(--bg4);color:var(--text4);border:1px solid var(--border);letter-spacing:.5px}
.content{overflow-y:auto}
.module-wrap{padding:20px 24px;display:flex;flex-direction:column;gap:16px;max-width:1600px;width:100%;margin:0 auto}
/* Sub-tabs */
.sub-tabs{display:flex;gap:1px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:3px;width:fit-content}
.stab{padding:5px 16px;font-size:10px;font-family:'IBM Plex Mono',monospace;border-radius:4px;cursor:pointer;color:var(--text3);border:none;background:transparent;transition:all .15s;letter-spacing:.8px;text-transform:uppercase;font-weight:500;white-space:nowrap}
.stab:hover{color:var(--text2)}
.stab.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.stab.disabled{opacity:.35;cursor:default;pointer-events:none}
.sub-tabs-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.sub-tabs-meta{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--text3)}
.sub-panel{display:none;flex-direction:column;gap:14px;animation:fadeIn .2s ease}
.sub-panel.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* Shared UI */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:12px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--green));opacity:.7}
.kpi-label{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.kpi-val{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:500;color:var(--accent,var(--green))}
.kpi-sub{font-size:9px;color:var(--text3);margin-top:4px}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.card-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-title{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:2px;display:flex;align-items:center;gap:8px;font-weight:500}
.card-body{padding:16px}
.tag{font-size:8px;padding:2px 7px;border-radius:2px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1px;font-weight:600;white-space:nowrap}
.tag-ai{background:var(--purpleDim);color:var(--purple);border:1px solid rgba(179,157,255,.3)}
.tag-ok{background:var(--greenDim);color:var(--green);border:1px solid rgba(0,229,168,.3)}
.tag-err{background:var(--redDim);color:var(--red);border:1px solid rgba(255,63,94,.3)}
.btn{padding:6px 14px;border-radius:4px;font-size:10px;font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all .15s;letter-spacing:.8px;border:none;text-transform:uppercase;font-weight:500;white-space:nowrap}
.btn-green{background:var(--green);color:#000}.btn-green:hover{filter:brightness(1.1)}
.btn-green:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.btn-demo{background:var(--amberDim);color:var(--amber);border:1px solid rgba(240,165,0,.3)}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-outline:hover{border-color:var(--border3);color:var(--text)}
.toolbar{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.flt{padding:4px 9px;font-size:9px;font-family:'IBM Plex Mono',monospace;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);transition:all .15s;letter-spacing:.5px;text-transform:uppercase}
.flt:hover{color:var(--text2);border-color:var(--border2)}
.flt.on{border-color:var(--text2);color:var(--text2);background:var(--bg3)}
.flt.on-call{border-color:var(--green);color:var(--green);background:var(--greenDim)}
.flt.on-put{border-color:var(--red);color:var(--red);background:var(--redDim)}
.flt.on-blue{border-color:var(--blue);color:var(--blue);background:var(--blueDim)}
.flt.on-amber{border-color:var(--amber);color:var(--amber);background:var(--amberDim)}
.flt.on-cyan{border-color:var(--cyan);color:var(--cyan);background:var(--cyanDim)}
.flt.on-purple{border-color:var(--purple);color:var(--purple);background:var(--purpleDim)}
.flt.on-green{border-color:var(--green);color:var(--green);background:var(--greenDim)}
.flt.on-red{border-color:var(--red);color:var(--red);background:var(--redDim)}
.search-input{flex:1;min-width:120px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:5px 10px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text);outline:none;transition:border-color .15s}
.search-input::placeholder{color:var(--text3)}.search-input:focus{border-color:var(--green)}
.row-count{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--text3);white-space:nowrap;margin-left:auto}
.table-wrap{overflow-x:auto;max-height:520px;overflow-y:auto}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;background:var(--bg2);z-index:10}
th{padding:8px 11px;text-align:right;font-size:8px;font-family:'IBM Plex Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;border-bottom:1px solid var(--border2);font-weight:400;cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s}
th.th-left{text-align:left}
th:hover{color:var(--text2)}
th.sort-asc::after{content:' ↑'}th.sort-desc::after{content:' ↓'}
td{padding:8px 11px;font-family:'IBM Plex Mono',monospace;font-size:11px;border-bottom:1px solid rgba(30,37,48,.7);white-space:nowrap;text-align:right;color:var(--text2)}
td.td-left{text-align:left}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02);color:var(--text)}
.badge{display:inline-block;padding:2px 7px;border-radius:2px;font-size:8px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
.b-call{background:var(--greenDim);color:var(--green);border:1px solid rgba(0,229,168,.25)}
.b-put{background:var(--redDim);color:var(--red);border:1px solid rgba(255,63,94,.25)}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--text2)}
.td-total{color:var(--text)!important;font-weight:500}
.empty-state{text-align:center;padding:48px 20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty-icon{width:46px;height:46px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.45}
.empty-state p{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);line-height:1.6;max-width:300px}
.shimmer{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:3px;display:inline-block}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.module-loading{display:flex;align-items:center;justify-content:center;height:200px;gap:12px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3)}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Landing */
.landing-grid{display:grid;grid-template-columns:240px 1fr;gap:20px;align-items:start}
@media(max-width:860px){.landing-grid{grid-template-columns:1fr}}
.dolar-block{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.block-title{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;padding:9px 14px;border-bottom:1px solid var(--border);font-weight:500}
.dolar-table{width:100%;border-collapse:collapse}
.dolar-table th{padding:5px 12px;font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text4);text-transform:uppercase;letter-spacing:1px;text-align:right;border-bottom:1px solid var(--border);font-weight:400}
.dolar-table th:first-child{text-align:left}
.dolar-table td{padding:7px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;border-bottom:1px solid rgba(30,37,48,.5);text-align:right;color:var(--text2)}
.dolar-table td:first-child{text-align:left;color:var(--text);font-weight:500}
.dolar-table tr:last-child td{border-bottom:none}
.dolar-table tr:hover td{background:rgba(255,255,255,.02)}
.sec-head{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-weight:500}
.sec-head::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--hc,var(--text3))}
.sec-head::after{content:'';flex:1;height:1px;background:var(--border)}
.rank-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
@media(max-width:900px){.rank-row{grid-template-columns:1fr 1fr}}
.rank-card{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.rank-head{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.rank-head-title{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;font-weight:500}
.rank-sort{font-size:8px;color:var(--text4);font-family:'IBM Plex Mono',monospace}
.rank-item{display:grid;grid-template-columns:16px 1fr auto auto;align-items:center;gap:6px;padding:7px 12px;border-bottom:1px solid rgba(30,37,48,.5)}
.rank-item:last-child{border-bottom:none}
.rank-item:hover{background:rgba(255,255,255,.02)}
.rank-pos{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text4);text-align:center}
.rank-sym{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;color:var(--text)}
.rank-sub{font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.rank-price{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);text-align:right}
.rank-chg{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;text-align:right;min-width:48px}
.rank-chg.up{color:var(--green)}.rank-chg.dn{color:var(--red)}.rank-chg.flat{color:var(--text3)}
.rank-empty{padding:14px 12px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);text-align:center}
.mod-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
@media(max-width:1000px){.mod-cards{grid-template-columns:repeat(3,1fr)}}
.mod-card{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:16px 14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.mod-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--mc,var(--green));opacity:.55;transition:opacity .18s}
.mod-card:hover{border-color:var(--border3);background:var(--bg3)}
.mod-card:hover::before{opacity:1}
.mod-card.disabled{opacity:.38;cursor:default;pointer-events:none}
.mc-icon{font-size:18px;margin-bottom:10px;display:block}
.mc-title{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;color:var(--text);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.mc-sub{font-size:10px;color:var(--text3);line-height:1.5}
.mc-badge{display:inline-block;font-size:8px;font-family:'IBM Plex Mono',monospace;padding:2px 5px;border-radius:2px;background:var(--bg4);color:var(--text4);border:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;margin-top:6px}
.mc-badge.live{background:var(--greenDim);color:var(--green);border-color:rgba(0,229,168,.3)}
/* GEX */
.gex-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:1000px){.gex-grid{grid-template-columns:1fr 1fr}}
.gex-card{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:14px 16px;position:relative;overflow:hidden}
.gex-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--accent,var(--green))}
.gex-card-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px;font-weight:500}
.gex-card-val{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;color:var(--accent,var(--green));margin-bottom:6px}
